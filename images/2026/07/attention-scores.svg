<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18">
  <defs>
    <style>
      .cell { fill: #e6f2ff; stroke: #4a90e2; stroke-width: 1.5; }
      .cell-text { fill: #1a3a5c; }
      .axis-label { fill: #333333; font-weight: 600; }
      .sub { font-size: 12px; baseline-shift: sub; }
    </style>
  </defs>

  <!-- Column headers (K1..K5) -->
  <g class="axis-label" text-anchor="middle">
    <text x="130" y="50">K<tspan class="sub">1</tspan></text>
    <text x="200" y="50">K<tspan class="sub">2</tspan></text>
    <text x="270" y="50">K<tspan class="sub">3</tspan></text>
    <text x="340" y="50">K<tspan class="sub">4</tspan></text>
    <text x="410" y="50">K<tspan class="sub">5</tspan></text>
  </g>

  <!-- Row headers (Q1..Q5) -->
  <g class="axis-label" text-anchor="middle">
    <text x="60" y="97">Q<tspan class="sub">1</tspan></text>
    <text x="60" y="147">Q<tspan class="sub">2</tspan></text>
    <text x="60" y="197">Q<tspan class="sub">3</tspan></text>
    <text x="60" y="247">Q<tspan class="sub">4</tspan></text>
    <text x="60" y="297">Q<tspan class="sub">5</tspan></text>
  </g>

  <!-- Row 1: Q1 -->
  <rect class="cell" x="100" y="75" width="60" height="40" rx="4"/>
